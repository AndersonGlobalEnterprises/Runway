services:
  - type: web
    name: age-runway-owner
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      # Auto-set
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: N8N_QUEUE_ENABLED
        value: "true"

      # Owner mode (non-sensitive)
      - key: DEMO_LOGIN
        value: "false"
      - key: OWNER_MODE
        value: "true"
      - key: OWNER_EMAIL
        value: omaranderson107@gmail.com

      # Secrets — paste from .env file when Render prompts, or use Render dashboard
      - key: OWNER_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      # Stripe webhook signing secret — enables auto-provision on payment (set in Render dashboard)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_RUNWAY_PRICE_STARTER_FOUNDING
        sync: false
      - key: STRIPE_RUNWAY_PRICE_STARTER
        sync: false
      - key: STRIPE_RUNWAY_PRICE_GROWTH_FOUNDING
        sync: false
      - key: STRIPE_RUNWAY_PRICE_GROWTH
        sync: false
      - key: STRIPE_RUNWAY_PRICE_SCALE
        sync: false
      - key: STRIPE_RUNWAY_PRICE_AGENCY
        sync: false
      - key: CREATOMATE_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      # HeyGen avatar video engine (set HEYGEN_API_KEY value in Render dashboard)
      - key: HEYGEN_API_KEY
        sync: false
      - key: HEYGEN_AVATAR_ID
        value: Abigail_standing_office_front
      - key: HEYGEN_VOICE_ID
        value: cef3bc4e0a84424cafcde6f2cf466c97
      # Shotstack faceless video engine (set SHOTSTACK_API_KEY value in Render dashboard)
      - key: SHOTSTACK_API_KEY
        sync: false
      - key: SHOTSTACK_ENV
        value: v1
      # Pexels B-roll for faceless videos (optional — branded gradient bg used when unset)
      - key: PEXELS_API_KEY
        sync: false
      # Shared secret for the n8n auto-poster to pull the approved-video publish queue
      - key: PUBLISH_KEY
        sync: false
